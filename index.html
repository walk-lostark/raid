<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>커염 레이드 일정!</title>
  <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet"/>

  <style>
    * { box-sizing: border-box; font-family: 'SUIT', sans-serif; }

    body {
      margin: 0;
      padding: 30px 10px;
      text-align: center;

      background-image: url("./00.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      min-height: 100vh;
    }

    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.55);
      pointer-events: none;
    }

    h1 {
      font-size: 1.8em;
      margin: 0 0 20px;
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: rgba(255,255,255,0.9);
      border-radius: 16px;
      padding: 26px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      position: relative;
      z-index: 1;
      text-align: left;
      backdrop-filter: blur(6px);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #d7d7d7;
      font-size: 1em;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      background: rgba(255,255,255,0.95);
    }
    input[type="text"]:focus{
      border-color: #3fa9f5;
      box-shadow: 0 0 0 4px rgba(63,169,245,0.18);
    }

    .btn {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-weight: 800;
      font-size: 1em;
      cursor: pointer;
      transition: transform .05s ease, filter .15s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:hover { filter: brightness(0.98); }

    .btn-submit { background-color: #28a745; color: white; }
    .btn-view   { background-color: #007bff; color: white; }
    .btn-guild  { background-color: #6f42c1; color: white; } /* 길드원 명단 보기 */
    .btn-gray   { background-color: #343a40; color: white; } /* 보조 */

    .top-left-actions{
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .back-btn, .mini-btn {
      color: white;
      border: none;
      padding: 7px 12px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 0.95em;
      cursor: pointer;
      white-space: nowrap;
    }
    .back-btn { background-color: #3fa9f5; }
    .mini-btn { background-color: #ff9800; }

    .section-title{
      font-weight: 800;
      margin-bottom: 8px;
      display: block;
    }

    /* 커스텀 체크박스 */
    .checkbox-group{
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 10px 0 6px;
    }
    .cb input[type="checkbox"]{
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      margin: 0;
      pointer-events: none;
    }
    .cb{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.85);
      cursor: pointer;
      user-select: none;
      transition: transform .05s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }
    .cb:hover{
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      border-color: rgba(63,169,245,0.55);
    }
    .cb:active{ transform: translateY(1px); }
    .cb .box{
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(0,0,0,0.25);
      display: grid;
      place-items: center;
      flex: 0 0 18px;
      background: #fff;
      transition: border-color .15s ease, background .15s ease;
    }
    .cb .box::after{
      content: "";
      width: 9px;
      height: 5px;
      border-left: 3px solid transparent;
      border-bottom: 3px solid transparent;
      transform: rotate(-45deg);
      margin-top: -1px;
      transition: border-color .15s ease;
    }
    .cb input[type="checkbox"]:checked + .box{
      border-color: #3fa9f5;
      background: rgba(63,169,245,0.12);
    }
    .cb input[type="checkbox"]:checked + .box::after{
      border-left-color: #3fa9f5;
      border-bottom-color: #3fa9f5;
    }
    .cb input[type="checkbox"]:checked ~ .label-text{
      font-weight: 800;
    }

    #etcTimeInput { margin-top: 8px; }

    summary { font-weight: 800; cursor: pointer; }
    ul { list-style: none; padding-left: 0; margin: 10px 0 0; }

    /* 참여 명단 아이템 + 삭제 X 버튼 */
    .credit-item{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px dashed rgba(0,0,0,0.12);
    }
    .credit-item:last-child{ border-bottom: none; }

    .del-btn{
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
      background: rgba(0,0,0,0.06);
    }
    .del-btn:hover{ background: rgba(255,0,0,0.12); }

    /* 길드원 명단 카드 */
    .member-card{
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      padding: 12px 12px;
      margin: 10px 0;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    .member-name{
      font-weight: 900;
      margin-bottom: 6px;
      font-size: 1.05em;
    }
    .member-line{
      padding: 6px 0;
      border-top: 1px dashed rgba(0,0,0,0.12);
    }
    .member-line:first-of-type{ border-top: none; }

    /* 자기 정보 적기 - 추가 입력 UI */
    .add-row{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0 4px;
      color: rgba(0,0,0,0.7);
      font-weight: 700;
    }
    .plus-btn{
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1.4em;
      font-weight: 900;
      background: rgba(63,169,245,0.18);
    }
    .plus-btn:hover{
      background: rgba(63,169,245,0.28);
    }

    .page-title{
      font-size: 1.2em;
      font-weight: 900;
      margin: 0 0 10px;
      text-align: left;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onValue,
      remove,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByg8FeU-3woVufxnLoEMhi4t7-CRlS6BI",
      authDomain: "participation-4f85e.firebaseapp.com",
      databaseURL: "https://participation-4f85e-default-rtdb.firebaseio.com",
      projectId: "participation-4f85e",
      storageBucket: "participation-4f85e.appspot.com",
      messagingSenderId: "694493909568",
      appId: "1:694493909568:web:1ebf7b9394e2ddce3d05a5",
      measurementId: "G-6T8L975CVQ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let submissions = [];
    let guildMembers = [];

    // ----- KST 유틸 -----
    const HOUR_MS = 3600 * 1000;
    const DAY_MS  = 24 * HOUR_MS;
    const KST_OFFSET_MS = 9 * HOUR_MS;

    function kstDayNumber(nowUtcMs = Date.now()) {
      return Math.floor((nowUtcMs + KST_OFFSET_MS) / DAY_MS);
    }
    function kstWeekday(nowUtcMs = Date.now()) {
      const kst = new Date(nowUtcMs + KST_OFFSET_MS);
      return kst.getUTCDay(); // 0 Sun .. 6 Sat
    }
    function dayNumberToKstMD(dayNum) {
      const utcMs = dayNum * DAY_MS - KST_OFFSET_MS;
      const kst = new Date(utcMs + KST_OFFSET_MS);
      return { month: kst.getUTCMonth() + 1, day: kst.getUTCDate() };
    }
    function getThisWeekMondayDayNum(nowUtcMs = Date.now()) {
      const dn = kstDayNumber(nowUtcMs);
      const wd = kstWeekday(nowUtcMs);
      const monIndex = (wd + 6) % 7; // Mon=0
      return dn - monIndex;
    }
    function getThisWeekTuesdayReset(nowUtcMs = Date.now()) {
      const mondayDn = getThisWeekMondayDayNum(nowUtcMs);
      const tuesdayDn = mondayDn + 1;
      const resetUtcMs = (tuesdayDn * DAY_MS) - KST_OFFSET_MS; // Tue 00:00 KST
      return { resetUtcMs, resetKey: String(tuesdayDn) };
    }
    function getTitleMondayDayNum(nowUtcMs = Date.now()) {
      const mondayDn = getThisWeekMondayDayNum(nowUtcMs);
      const { resetUtcMs } = getThisWeekTuesdayReset(nowUtcMs);
      return (nowUtcMs < resetUtcMs) ? mondayDn : (mondayDn + 7);
    }
    function updateTitle() {
      const mondayDn = getTitleMondayDayNum(Date.now());
      const md = dayNumberToKstMD(mondayDn);
      const h1 = document.getElementById("pageTitle");
      h1.textContent = `🐹${md.month}월${md.day}일 커염 길드 레이드 신청🐹`;
      document.title = `${md.month}월${md.day}일 커염 레이드 신청`;
    }

    async function ensureWeeklyReset() {
      const now = Date.now();
      const { resetUtcMs, resetKey } = getThisWeekTuesdayReset(now);
      if (now < resetUtcMs) return;

      const metaRef = ref(db, "meta/lastResetKey");
      const tx = await runTransaction(metaRef, (current) => {
        if (current === resetKey) return;
        return resetKey;
      });

      if (tx.committed) {
        await remove(ref(db, "submissions"));
      }
    }

    // ✅ 전투력: 저장/표시 모두에서 % 제거
    function normalizePower(value) {
      return String(value ?? "").replace(/%/g, "").trim();
    }
    function displayPower(value) {
      return String(value ?? "").replace(/%/g, "").trim();
    }

    // ✅ 닉네임/클래스: '/'가 없으면 안전하게 보정
    function normalizeNickClass(value) {
      const raw = String(value ?? "").trim();
      if (!raw) return "";

      if (raw.includes("/")) {
        const [a, b] = raw.split("/").map(s => s.trim());
        if (a && b) return `${a}/${b}`;
        return raw;
      }

      const parts = raw.split(/[,\-|｜|\s]+/).map(s => s.trim()).filter(Boolean);
      if (parts.length >= 2) {
        return `${parts[0]}/${parts.slice(1).join("")}`;
      }

      return raw;
    }

    // 화면 전환 유틸
    function showOnly(screenId) {
      const ids = ["mainForm", "creditScreen", "guildScreen", "guildFormScreen"];
      ids.forEach(id => document.getElementById(id).style.display = (id === screenId ? "block" : "none"));
    }

    // 체크박스 기타 입력 토글
    window.toggleEtcInput = () => {
      const check = document.getElementById("etcTimeCheck");
      const input = document.getElementById("etcTimeInput");
      input.style.display = check.checked ? "block" : "none";
    };

    // ---------------- 참여 신청 ----------------
    window.submitForm = async () => {
      await ensureWeeklyReset();

      const nicknameRaw = document.getElementById("nickname").value;
      const powerRaw = document.getElementById("percent").value.trim();

      let selectedTimes = Array.from(document.querySelectorAll('input[name="time"]:checked'))
        .map(cb => cb.value);

      const etcChecked = document.getElementById("etcTimeCheck").checked;
      const etcValue = document.getElementById("etcTimeText").value.trim();

      if (etcChecked) {
        if (!etcValue) {
          alert("기타 시간을 입력해주세요.");
          return;
        }
        selectedTimes.push(etcValue);
      }

      const nickname = normalizeNickClass(nicknameRaw);
      const power = normalizePower(powerRaw);

      if (!nickname || !power || selectedTimes.length === 0) {
        alert("모든 항목을 입력해주세요.");
        return;
      }

      const submission = {
        nickname,
        group: selectedTimes.join(", "),
        percent: power
      };

      push(ref(db, "submissions"), submission);

      alert("신청 완료!");

      document.getElementById("nickname").value = "";
      document.getElementById("percent").value = "";
      document.getElementById("etcTimeText").value = "";
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      toggleEtcInput();
    };

    // ---------------- 참여 명단 보기 ----------------
    window.showCredits = async () => {
      await ensureWeeklyReset();

      const submissionsRef = ref(db, "submissions");
      onValue(submissionsRef, (snapshot) => {
        submissions = [];
        snapshot.forEach((childSnapshot) => {
          submissions.push({ id: childSnapshot.key, ...childSnapshot.val() });
        });

        showOnly("creditScreen");
        renderCredits();
      }, { onlyOnce: false });
    };

    window.deleteEntryPublic = async (id) => {
      if (!id) return;
      if (!confirm("해당 신청을 삭제할까요?")) return;
      await remove(ref(db, `submissions/${id}`));
    };

    function renderCredits() {
      const creditText = document.getElementById("creditText");

      if (submissions.length === 0) {
        creditText.innerHTML = "<p>명단이 없습니다.</p>";
        return;
      }

      const groups = {};
      submissions.forEach(item => {
        const g = item.group || "기타";
        if (!groups[g]) groups[g] = [];
        groups[g].push(item);
      });

      let html = `<p>현재 참여한 길드원 <span style="color:red;font-size:1.3em">${submissions.length}</span>명</p>`;

      Object.entries(groups).forEach(([group, list]) => {
        html += `<details>
                   <summary>${group} / ${list.length}명</summary>
                   <ul>
                     ${list.map(p => `
                       <li class="credit-item">
                         <span>${p.nickname} / ${displayPower(p.percent)}</span>
                         <button class="del-btn" title="삭제" onclick="deleteEntryPublic('${p.id}')">×</button>
                       </li>
                     `).join("")}
                   </ul>
                 </details>`;
      });

      creditText.innerHTML = html;
    }

    // ---------------- 길드원 명단 보기 ----------------
    window.showGuildList = async () => {
      await ensureWeeklyReset();

      const guildRef = ref(db, "guildMembers");
      onValue(guildRef, (snapshot) => {
        guildMembers = [];
        snapshot.forEach((childSnapshot) => {
          guildMembers.push({ id: childSnapshot.key, ...childSnapshot.val() });
        });

        showOnly("guildScreen");
        renderGuildList();
      }, { onlyOnce: false });
    };

    function renderGuildList() {
      const box = document.getElementById("guildListBox");

      if (!guildMembers.length) {
        box.innerHTML = "<p>길드원 명단이 없습니다.</p>";
        return;
      }

      // 최신순(생성시간) 정렬 (있으면)
      const sorted = [...guildMembers].sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

      let html = `<p>현재 등록된 길드원 <span style="color:red;font-size:1.3em">${sorted.length}</span>명</p>`;

      sorted.forEach(m => {
        const name = (m.displayName || "").trim() || "이름없음";

        // entries가 배열/객체 둘 다 대응
        let entries = [];
        if (Array.isArray(m.entries)) {
          entries = m.entries;
        } else if (m.entries && typeof m.entries === "object") {
          entries = Object.values(m.entries);
        }

        entries = entries.map(e => String(e ?? "").trim()).filter(Boolean);
        if (!entries.length) entries = ["(정보 없음)"];

        html += `
          <div class="member-card">
            <div class="member-name">🐹 ${escapeHtml(name)}</div>
            ${entries.map(line => `
              <div class="member-line">${escapeHtml(stripPercentFromLine(line))}</div>
            `).join("")}
          </div>
        `;
      });

      box.innerHTML = html;
    }

    // 길드원 입력 화면 열기
    window.openGuildForm = () => {
      // 초기 상태: 입력칸 1개만
      document.getElementById("guildDisplayName").value = "";
      const holder = document.getElementById("entryFields");
      holder.innerHTML = "";
      addEntryField(); // 1개 기본 생성

      showOnly("guildFormScreen");
    };

    // + 버튼으로 입력칸 추가
    window.addEntryField = () => addEntryField();
    function addEntryField() {
      const holder = document.getElementById("entryFields");
      const idx = holder.children.length + 1;

      const input = document.createElement("input");
      input.type = "text";
      input.className = "guildEntry";
      input.placeholder = `아이디/클래스/전투력 (예: abc/화술/6.0)`;
      input.setAttribute("data-idx", String(idx));

      holder.appendChild(input);
    }

    // 길드원 정보 저장
    window.submitGuildInfo = async () => {
      const displayName = document.getElementById("guildDisplayName").value.trim();
      const entryInputs = Array.from(document.querySelectorAll(".guildEntry"));

      let entries = entryInputs
        .map(i => i.value.trim())
        .filter(Boolean)
        .map(line => stripPercentFromLine(line));

      if (!displayName) {
        alert("불리고 싶은 닉네임을 입력해주세요.");
        return;
      }
      if (!entries.length) {
        alert("아이디/클래스/전투력 정보를 1개 이상 입력해주세요.");
        return;
      }

      await push(ref(db, "guildMembers"), {
        displayName,
        entries,
        createdAt: Date.now()
      });

      alert("입력 완료!");
      // 입력 후 길드원 명단으로 이동
      showGuildList();
    };

    // 뒤로가기 (화면별)
    window.goBackToMain = () => showOnly("mainForm");
    window.goBackToCredits = () => showOnly("creditScreen");
    window.goBackToGuild = () => showOnly("guildScreen");

    // --- 유틸: HTML escape
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // --- 유틸: 라인에서 % 제거 (예: abc/화술/6.0% -> abc/화술/6.0)
    function stripPercentFromLine(line) {
      return String(line).replace(/%/g, "").trim();
    }

    // ---------------- 시작 ----------------
    (async function boot() {
      updateTitle();
      await ensureWeeklyReset();
      updateTitle();

      setInterval(async () => {
        updateTitle();
        await ensureWeeklyReset();
      }, 60 * 1000);
    })();
  </script>
</head>

<body>
  <h1 id="pageTitle">🐹커염 길드 레이드 신청🐹</h1>

  <!-- 메인 화면 -->
  <div class="container" id="mainForm">
    <span class="section-title">참여 가능 시간 (복수 선택 가능)</span>

    <div class="checkbox-group">
      <label class="cb">
        <input type="checkbox" name="time" value="9시">
        <span class="box"></span>
        <span class="label-text">9시</span>
      </label>

      <label class="cb">
        <input type="checkbox" name="time" value="9시반">
        <span class="box"></span>
        <span class="label-text">9시 반</span>
      </label>

      <label class="cb">
        <input type="checkbox" id="etcTimeCheck" onchange="toggleEtcInput()">
        <span class="box"></span>
        <span class="label-text">기타</span>
      </label>
    </div>

    <div id="etcTimeInput" style="display:none;">
      <input type="text" id="etcTimeText" placeholder="원하는 시간을 입력하세요 (예: 10시)">
    </div>

    <input type="text" id="nickname" placeholder="닉네임/클래스 (예: 귀염/화술 또는 귀염 화술)">
    <input type="text" id="percent" placeholder="전투력 (예: 6.0)">

    <button class="btn btn-submit" onclick="submitForm()">신청하기</button>
    <button class="btn btn-view" onclick="showCredits()">참여 명단 보기</button>

    <!-- ✅ 추가: 길드원 명단 보기 버튼 -->
    <button class="btn btn-guild" onclick="showGuildList()">길드원 명단 보기</button>
  </div>

  <!-- 참여 명단 보기 화면 -->
  <div class="container" id="creditScreen" style="display:none;">
    <div class="top-left-actions">
      <button class="back-btn" onclick="goBackToMain()">뒤로가기</button>
    </div>
    <div style="height:34px;"></div>
    <div id="creditText"></div>
  </div>

  <!-- 길드원 명단 보기 화면 -->
  <div class="container" id="guildScreen" style="display:none;">
    <div class="top-left-actions">
      <button class="back-btn" onclick="goBackToMain()">뒤로가기</button>
      <!-- ✅ 추가: 자기 정보 적기 버튼 -->
      <button class="mini-btn" onclick="openGuildForm()">자기 정보 적기</button>
    </div>
    <div style="height:34px;"></div>
    <div id="guildListBox"></div>
  </div>

  <!-- 자기 정보 적기 화면 -->
  <div class="container" id="guildFormScreen" style="display:none;">
    <div class="top-left-actions">
      <button class="back-btn" onclick="goBackToGuild()">뒤로가기</button>
    </div>
    <div style="height:34px;"></div>

    <div class="page-title">자기 정보 적기</div>

    <div style="font-weight:800; margin-top:6px;">- 불리고 싶은 닉네임</div>
    <input type="text" id="guildDisplayName" placeholder="예: 귀염이">

    <div style="font-weight:800; margin-top:10px;">- 아이디/클래스/전투력</div>
    <div id="entryFields"></div>

    <div class="add-row">
      <span>추가로 입력하려면 +를 눌러주세요.</span>
      <button class="plus-btn" title="추가" onclick="addEntryField()">+</button>
    </div>

    <button class="btn btn-submit" onclick="submitGuildInfo()">입력하기</button>
    <button class="btn btn-guild" onclick="showGuildList()">길드원 명단 보기</button>
  </div>
</body>
</html>
