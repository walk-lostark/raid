<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>커염 레이드 일정!</title>

<link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet"/>

<style>
*{box-sizing:border-box;font-family:'SUIT',sans-serif}

body{
margin:0;
padding:30px 10px;
text-align:center;
background-image:url("./00.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(255,255,255,0.55);
pointer-events:none;
}

h1{
font-size:1.8em;
margin:0 0 20px;
position:relative;
z-index:1;
text-shadow:0 1px 0 rgba(255,255,255,0.6);
}

.container{
max-width:520px;
margin:0 auto;
background:rgba(255,255,255,0.92);
border-radius:16px;
padding:26px 20px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
position:relative;
z-index:1;
text-align:left;
backdrop-filter:blur(6px);
}

input[type="text"],input[type="password"]{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #d7d7d7;
font-size:1em;
outline:none;
background:#fff;
}

.btn{
width:100%;
padding:11px;
margin-top:10px;
border-radius:10px;
border:none;
font-weight:800;
font-size:1em;
cursor:pointer;
}

.btn-submit{background:#28a745;color:#fff}
.btn-view{background:#007bff;color:#fff}
.btn-guild{background:#6f42c1;color:#fff}
.btn-save{background:#ff9800;color:#fff}

.section-title{font-weight:800;margin-bottom:8px;display:block}

.form-section-title{
font-weight:900;
font-size:1.05em;
margin-top:14px;
margin-bottom:6px;
}
.form-section-title::before{content:" - ";}

.checkbox-group{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 6px}
.cb input{display:none}
.cb{
display:inline-flex;
align-items:center;
gap:8px;
padding:10px 12px;
border-radius:12px;
border:1px solid rgba(0,0,0,0.12);
background:#fff;
cursor:pointer;
}
.cb .box{
width:18px;height:18px;border-radius:4px;border:2px solid #aaa;
}
.cb input:checked + .box{background:#3fa9f5;border-color:#3fa9f5}

.pick-section{
margin-top:18px;
padding-top:16px;
border-top:1px dashed rgba(0,0,0,0.25);
position:relative;
padding-bottom:28px;
}
.pick-title{
text-align:center;
font-weight:900;
font-size:1.2em;
margin-bottom:12px;
}
.pick-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}
.pick-card{
border-radius:16px;
overflow:hidden;
background:#fff;
box-shadow:0 8px 18px rgba(0,0,0,0.06);
}
.pick-card img{
width:100%;
aspect-ratio:1/1;
object-fit:contain;
background:#fff;
}
.pick-note{
position:absolute;
right:0;
bottom:0;
font-size:0.9em;
color:rgba(0,0,0,0.55);
font-weight:700;
}
</style>
</head>

<body>

<h1 id="pageTitle">🐹커염 길드 레이드 신청🐹</h1>

<div class="container" id="mainForm">

<span class="section-title">참여 가능 시간 (복수 선택 가능)</span>

<div class="checkbox-group">
<label class="cb">
<input type="checkbox" name="time" value="9시">
<span class="box"></span>9시
</label>
<label class="cb">
<input type="checkbox" name="time" value="9시반">
<span class="box"></span>9시 반
</label>
</div>

<div class="form-section-title">닉네임/클래스</div>
<input type="text" id="nickname">

<div class="form-section-title">전투력</div>
<input type="text" id="percent">

<button class="btn btn-submit">신청하기</button>
<button class="btn btn-view">참여 명단 보기</button>
<button class="btn btn-guild">길드원 명단 보기</button>

<div id="mainPickBox"></div>

</div>

<script>
const HOUR_MS=3600*1000;
const DAY_MS=24*HOUR_MS;
const KST_OFFSET=9*HOUR_MS;

function kstDayNumber(){
return Math.floor((Date.now()+KST_OFFSET)/DAY_MS);
}

function dailyPicks(seed,total,count){
let s=(seed>>>0)+0x9e3779b9;
const next=()=>{s=(1664525*s+1013904223)>>>0;return s;}
const set=new Set();
while(set.size<count){
set.add((next()%total)+1);
}
return Array.from(set);
}

function renderMainDailyPick(){
const box=document.getElementById("mainPickBox");
const seed=kstDayNumber();
const picks=dailyPicks(seed,26,3);

const html=picks.map(n=>{
const file=String(n).padStart(3,"0")+".jpg";
return `<div class="pick-card">
<img src="./${file}" alt="">
</div>`;
}).join("");

box.innerHTML=`
<div class="pick-section">
<div class="pick-title">🌟 오늘의 커염 스텔라 픽 🌟</div>
<div class="pick-grid">${html}</div>
<div class="pick-note">매일 3명이 선정돼요.</div>
</div>`;
}

function updateTitle(){
const now=new Date();
const monday=new Date(now);
monday.setDate(now.getDate()-((now.getDay()+6)%7));
document.getElementById("pageTitle").textContent=
`🐹${monday.getMonth()+1}월${monday.getDate()}일 커염 길드 레이드 신청🐹`;
}

updateTitle();
renderMainDailyPick();
setInterval(()=>{
updateTitle();
renderMainDailyPick();
},60000);

</script>

</body>
</html>
